# Single node cluster config for dev/test/demo.
# Faster image loading (1 node vs 4). The worker node gets both
# hfmaster and hfworker labels so all nodeSelectors are satisfied.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
- role: worker
  labels:
    hyperflow-wms/nodepool: hfmaster
  extraPortMappings: []
